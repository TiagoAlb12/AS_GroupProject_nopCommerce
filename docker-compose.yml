services:
  nopcommerce_web:
    build: .
    container_name: nopcommerce
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - nopcommerce_database
      - telemetry_service
    volumes:
      - nopcommerce_data:/app/App_Data
    environment:
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__VirtualHost: /
      RabbitMQ__UserName: nopcommerce
      RabbitMQ__Password: nopCommerce_rabbit_password

  nopcommerce_database:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: nopcommerce_mssql_server
    environment:
      SA_PASSWORD: "nopCommerce_db_password"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    volumes:
      - nopcommerce_db_data:/var/opt/mssql

  telemetry_service:
    image: otel/opentelemetry-collector-contrib:0.132.0
    container_name: opentelemetry_collector
    command: ["--config=/etc/otel-config.yaml"]

    volumes:
      - ./otel-config.yaml:/etc/otel-config.yaml

    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (vai ser usado para os logs)
      - "9464:9464"   # Prometheus scrape endpoint

    depends_on:
      - jaeger
      - loki

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC ingest

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - telemetry_service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
      - loki

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

  order_integration_service:
    build:
      context: ./src/ExternalServices/OrderIntegrationService
    container_name: order_integration_service
    restart: unless-stopped
    depends_on:
      - rabbitmq
    environment:
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__VirtualHost: /
      RabbitMQ__UserName: nopcommerce
      RabbitMQ__Password: nopCommerce_rabbit_password
      RabbitMQ__QueueName: nopcommerce.order.created

volumes:
  nopcommerce_data:
  nopcommerce_db_data:
  grafana_data:
  loki_data:
  rabbitmq_data: